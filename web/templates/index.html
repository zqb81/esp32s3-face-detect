<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32-S3 人脸检测</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 20px;
            border-bottom: 1px solid #334155;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #f1f5f9;
        }
        .header .subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 4px;
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        .status-indicator.connected { background: #22c55e; }
        .status-indicator.disconnected { background: #ef4444; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
        }
        .stat-card .label {
            color: #94a3b8;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: #f1f5f9;
            margin-top: 4px;
        }
        .stat-card .sub {
            color: #64748b;
            font-size: 12px;
            margin-top: 4px;
        }
        .main-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
        }
        .faces-panel {
            margin-bottom: 20px;
        }
        .faces-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            padding: 16px;
        }
        .face-card {
            background: #0f172a;
            border-radius: 8px;
            overflow: hidden;
            text-align: center;
            transition: transform 0.2s;
        }
        .face-card:hover {
            transform: scale(1.05);
        }
        .face-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }
        .face-card .info {
            padding: 8px;
            font-size: 11px;
        }
        .face-card .score {
            color: #22c55e;
            font-weight: 600;
        }
        @media (max-width: 900px) {
            .main-content { grid-template-columns: 1fr; }
        }
        .panel {
            background: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
            overflow: hidden;
        }
        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid #334155;
            font-weight: 600;
            color: #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-body {
            max-height: 600px;
            overflow-y: auto;
        }
        .detection-item {
            padding: 16px 20px;
            border-bottom: 1px solid #334155;
            transition: background 0.2s;
        }
        .detection-item:hover {
            background: #334155;
        }
        .detection-item:last-child {
            border-bottom: none;
        }
        .detection-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .detection-time {
            color: #94a3b8;
            font-size: 12px;
        }
        .face-count {
            background: #3b82f6;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .face-box {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        .face-tag {
            background: #0f172a;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
        }
        .face-tag .score {
            color: #22c55e;
            font-weight: 600;
        }
        .new-detection {
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .device-info {
            color: #64748b;
            font-size: 11px;
        }
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #22c55e;
            font-size: 12px;
        }
        .live-dot {
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: #64748b;
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <h1>🎥 ESP32-S3 人脸检测</h1>
            <div class="subtitle">
                <span class="status-indicator" id="status"></span>
                <span id="status-text">服务器连接中...</span> | <span id="device-status">设备: 离线</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">总检测次数</div>
                <div class="value" id="total-detections">-</div>
            </div>
            <div class="stat-card">
                <div class="label">总人脸数</div>
                <div class="value" id="total-faces">-</div>
            </div>
            <div class="stat-card">
                <div class="label">设备数量</div>
                <div class="value" id="devices">-</div>
            </div>
            <div class="stat-card">
                <div class="label">最后检测</div>
                <div class="value" id="last-time" style="font-size: 16px;">-</div>
            </div>
        </div>

        <div class="panel faces-panel">
            <div class="panel-header">
                <span>👤 人脸图片</span>
                <span class="device-info" id="face-count"></span>
            </div>
            <div class="faces-grid" id="faces-grid">
                <div class="empty-state" style="grid-column: 1/-1">
                    <div class="icon">😶</div>
                    <div>暂无人脸图片</div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="panel">
                <div class="panel-header">
                    <span>📋 历史记录</span>
                    <span class="device-info" id="record-count"></span>
                </div>
                <div class="panel-body" id="history-list">
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <div>暂无数据</div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <span>⚡ 实时检测</span>
                    <span class="live-indicator">
                        <span class="live-dot"></span>
                        LIVE
                    </span>
                </div>
                <div class="panel-body" id="live-list">
                    <div class="empty-state">
                        <div class="icon">👁️</div>
                        <div>等待检测...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // WebSocket 连接
        const socket = io();
        
        // DOM 元素
        const statusEl = document.getElementById('status');
        const statusTextEl = document.getElementById('status-text');
        const totalDetectionsEl = document.getElementById('total-detections');
        const totalFacesEl = document.getElementById('total-faces');
        const devicesEl = document.getElementById('devices');
        const lastTimeEl = document.getElementById('last-time');
        const historyListEl = document.getElementById('history-list');
        const liveListEl = document.getElementById('live-list');
        const recordCountEl = document.getElementById('record-count');

        // WebSocket 事件
        socket.on('connect', () => {
            statusEl.classList.add('connected');
            statusEl.classList.remove('disconnected');
            statusTextEl.textContent = '已连接';
            loadStats();
            loadHistory();
        });

        socket.on('disconnect', () => {
            statusEl.classList.remove('connected');
            statusEl.classList.add('disconnected');
            statusTextEl.textContent = '连接断开';
        });

        let deviceLastSeen = 0;
        let deviceCheckInterval = null;

        socket.on('new_detection', (data) => {
            deviceLastSeen = Date.now();
            document.getElementById('device-status').textContent = '设备: 🟢 在线';
            document.getElementById('device-status').style.color = '#22c55e';
            addLiveDetection(data);
            addHistoryItem(data, true);
            loadStats();
        });

        socket.on('new_face_image', (data) => {
            addFaceImage(data, true);
        });

        // 每5秒检查设备是否在线（超过10秒没数据=离线）
        deviceCheckInterval = setInterval(() => {
            const el = document.getElementById('device-status');
            if (Date.now() - deviceLastSeen > 10000) {
                el.textContent = '设备: 🔴 离线';
                el.style.color = '#ef4444';
            }
        }, 5000);

        // 加载统计
        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                totalDetectionsEl.textContent = data.total_detections;
                totalFacesEl.textContent = data.total_faces;
                devicesEl.textContent = data.devices;
                lastTimeEl.textContent = data.last_detection;
            } catch (e) {
                console.error('加载统计失败:', e);
            }
        }

        // 加载历史
        async function loadHistory() {
            try {
                const res = await fetch('/api/detections?limit=50');
                const data = await res.json();
                
                historyListEl.innerHTML = '';
                if (data.length === 0) {
                    historyListEl.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📭</div>
                            <div>暂无数据</div>
                        </div>`;
                } else {
                    data.forEach(item => addHistoryItem(item, false));
                }
                recordCountEl.textContent = `${data.length} 条记录`;
            } catch (e) {
                console.error('加载历史失败:', e);
            }
        }

        // 添加历史项
        function addHistoryItem(data, isNew) {
            const div = document.createElement('div');
            div.className = 'detection-item' + (isNew ? ' new-detection' : '');
            
            let facesHtml = '';
            if (data.faces && data.faces.length > 0) {
                facesHtml = '<div class="face-box">';
                data.faces.forEach((face, i) => {
                    const score = (face.score * 100).toFixed(1);
                    facesHtml += `
                        <div class="face-tag">
                            👤 ${i+1}: <span class="score">${score}%</span>
                        </div>`;
                });
                facesHtml += '</div>';
            }

            div.innerHTML = `
                <div class="detection-header">
                    <span class="detection-time">${data.datetime || '未知时间'}</span>
                    <span class="face-count">${data.face_count} 张人脸</span>
                </div>
                <div class="device-info">设备: ${data.device || 'ESP32'} | 帧: ${data.frame || '-'}</div>
                ${facesHtml}
            `;

            if (isNew) {
                historyListEl.insertBefore(div, historyListEl.firstChild);
                // 限制显示数量
                while (historyListEl.children.length > 100) {
                    historyListEl.removeChild(historyListEl.lastChild);
                }
            } else {
                historyListEl.appendChild(div);
            }
        }

        // 添加实时检测
        function addLiveDetection(data) {
            const div = document.createElement('div');
            div.className = 'detection-item new-detection';
            
            const now = data.time || new Date().toLocaleTimeString();
            
            let facesHtml = '';
            if (data.faces && data.faces.length > 0) {
                facesHtml = '<div class="face-box">';
                data.faces.forEach((face, i) => {
                    const score = (face.score * 100).toFixed(1);
                    const box = face.box;
                    facesHtml += `
                        <div class="face-tag">
                            👤 ${i+1}: <span class="score">${score}%</span><br>
                            📍 (${box[0]},${box[1]})-(${box[2]},${box[3]})
                        </div>`;
                });
                facesHtml += '</div>';
            }

            div.innerHTML = `
                <div class="detection-header">
                    <span class="detection-time">${now}</span>
                    <span class="face-count">${data.face_count} 张人脸</span>
                </div>
                ${facesHtml}
            `;

            liveListEl.insertBefore(div, liveListEl.firstChild);
            
            // 限制显示数量
            while (liveListEl.children.length > 20) {
                liveListEl.removeChild(liveListEl.lastChild);
            }
        }

        // 加载人脸图片
        const facesGridEl = document.getElementById('faces-grid');
        const faceCountEl = document.getElementById('face-count');

        async function loadFaceImages() {
            try {
                const res = await fetch('/api/face_images?limit=20');
                const data = await res.json();
                facesGridEl.innerHTML = '';
                if (data.length === 0) {
                    facesGridEl.innerHTML = `
                        <div class="empty-state" style="grid-column: 1/-1">
                            <div class="icon">😶</div>
                            <div>暂无人脸图片</div>
                        </div>`;
                } else {
                    data.forEach(item => addFaceImage(item, false));
                }
                faceCountEl.textContent = `${data.length} 张`;
            } catch (e) {
                console.error('加载人脸图片失败:', e);
            }
        }

        function addFaceImage(data, isNew) {
            const div = document.createElement('div');
            div.className = 'face-card' + (isNew ? ' new-detection' : '');
            const score = (data.score * 100).toFixed(1);
            div.innerHTML = `
                <img src="${data.img_url}" alt="人脸" loading="lazy">
                <div class="info">
                    <span class="score">${score}%</span><br>
                    <span>${data.datetime || ''}</span>
                </div>
            `;
            if (isNew) {
                facesGridEl.insertBefore(div, facesGridEl.firstChild);
                // 限制显示数量
                while (facesGridEl.children.length > 20) {
                    facesGridEl.removeChild(facesGridEl.lastChild);
                }
            } else {
                facesGridEl.appendChild(div);
            }
        }

        // 初始加载
        loadStats();
        loadHistory();
        loadFaceImages();
    </script>
</body>
</html>
